workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: |
          cd app
          flutter pub get
      - name: Build APK
        script: |
          cd app
          flutter build apk --debug
    artifacts:
      - app/build/**/outputs/**/*.apk
