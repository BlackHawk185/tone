workflows:
  ios-release:
    name: iOS Release Build (AltStore)
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: |
          cd app
          flutter pub get
      - name: Build iOS app
        script: |
          cd app
          flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          cd app/build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r Tone.ipa Payload
          mv Tone.ipa ../../../../app/
    artifacts:
      - app/Tone.ipa
  
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: |
          cd app
          flutter pub get
      - name: Build iOS
        script: |
          cd app
          flutter build ios --debug --no-codesign
    artifacts:
      - app/build/ios/Debug-iphoneos/*.app
  
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: |
          cd app
          flutter pub get
      - name: Build APK
        script: |
          cd app
          flutter build apk --debug
    artifacts:
      - app/build/**/outputs/**/*.apk
