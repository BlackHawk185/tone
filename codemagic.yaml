workflows:
  ios-release:
    name: iOS Release Build (AltStore)
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: |
          cd app
          flutter pub get
      - name: Build IPA for AltStore
        script: |
          cd app
          flutter build ipa --release --no-codesign
    artifacts:
      - app/build/ios/ipa/*.ipa
  
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: |
          cd app
          flutter pub get
      - name: Build iOS
        script: |
          cd app
          flutter build ios --debug --no-codesign
    artifacts:
      - app/build/ios/Debug-iphoneos/*.app
  
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: |
          cd app
          flutter pub get
      - name: Build APK
        script: |
          cd app
          flutter build apk --debug
    artifacts:
      - app/build/**/outputs/**/*.apk
