<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Tone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121212;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 90%;
    }
    h1 { font-size: 1.8rem; margin-bottom: .4rem; }
    .subtitle { color: #aaa; font-size: .95rem; margin-bottom: 2rem; }
    .btn {
      display: block;
      width: 100%;
      padding: 1rem;
      margin-bottom: 1rem;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-ios { background: #007AFF; }
    .btn-android { background: #34A853; }
    .note {
      margin-top: 1.5rem;
      font-size: .8rem;
      color: #777;
      line-height: 1.5;
    }
    .note a { color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tone Dispatch</h1>
    <p class="subtitle">Pine Bluffs Fire &amp; EMS</p>

    <a id="ios-btn" class="btn btn-ios"
       href="https://github.com/BlackHawk185/tone/releases/latest/download/Tone.ipa">
      Download for iOS
    </a>
    <a id="android-btn" class="btn btn-android"
       href="https://github.com/BlackHawk185/tone/releases/latest/download/Tone.apk">
      Download for Android
    </a>

    <p class="note">
      iOS: Install via <a href="https://altstore.io" target="_blank" rel="noopener">AltStore</a>
      or sideload the IPA.<br>
      Android: Enable "Install from unknown sources" if prompted.
    </p>
  </div>

  <script>
    // Auto-highlight the platform button relevant to this visitor.
    (function () {
      var ua = navigator.userAgent || '';
      var ios = /iPhone|iPad|iPod/i.test(ua);
      var android = /Android/i.test(ua);
      if (ios) {
        document.getElementById('android-btn').style.opacity = '0.4';
      } else if (android) {
        document.getElementById('ios-btn').style.opacity = '0.4';
      }
    })();
  </script>
</body>
</html>
